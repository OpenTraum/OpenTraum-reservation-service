name: CI/CD (main)

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 881490135253.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: skala3-cloud1-team8-opentraum-reservation-service

jobs:
  build_image:

    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_manifest:

    needs: build_image
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 881490135253.dkr.ecr.ap-northeast-2.amazonaws.com
      ECR_REPOSITORY: skala3-cloud1-team8-opentraum-reservation-service
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: k8s 매니페스트 이미지 태그 업데이트
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/OpenTraum/OpenTraum-reservation-service.git
          git fetch origin main
          git checkout main
          sed -i "s|image: .*opentraum-reservation-service.*|image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ github.sha }}|" k8s/deployment.yml
          git add k8s/deployment.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: 이미지 태그 업데이트 [${{ github.sha }}]"
          git push origin main
