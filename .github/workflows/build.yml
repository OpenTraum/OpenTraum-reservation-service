name: Build Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradlew.bat'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle 테스트
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon
