server:
  port: 8084
  shutdown: graceful

spring:
  application:
    name: opentraum-reservation-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # R2DBC - MariaDB
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:opentraum-mariadb}:${DB_PORT:3306}/opentraum_reservation
    username: ${DB_USERNAME:opentraum}
    password: ${DB_PASSWORD:opentraum123!}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Redis (Queue / Distributed Lock)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: reservation-saga-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      concurrency: 3
      ack-mode: MANUAL_IMMEDIATE

  # SQL Init
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# Actuator + Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Queue Properties
opentraum:
  event-service:
    url: ${EVENT_SERVICE_URL:http://localhost:8083}
  queue:
    batch-size: 100
    max-active-users: 500
    max-queue-size: 100000
    heartbeat-ttl-seconds: 30
    token-ttl-seconds: 300
    active-timeout-seconds: 60
    scheduler-interval-ms: 5000
    cleanup-interval-ms: 10000

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    com.opentraum.reservation: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework.data.redis: DEBUG
