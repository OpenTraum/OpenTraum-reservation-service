apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: opentraum
  labels:
    app: reservation-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: reservation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: reservation
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-high
      serviceAccountName: opentraum-sidecar-sa
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                        - payment-service
                        - event-service
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-payment
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              echo Waiting for payment-service...;
              until wget -qO- http://payment-service:8085/actuator/health 2>/dev/null | grep -q UP;
              do echo payment not ready; sleep 3; done;
              echo payment-service is ready!
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 10m
              memory: 32Mi
      containers:
        - name: reservation-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-reservation-service:77b3241ae3a862b65d2543784b83a09fa48c71a4
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://opentraum-mariadb.mariadb:3306/opentraum_reservation"
            - name: SPRING_R2DBC_USERNAME
              value: "opentraum"
            - name: SPRING_R2DBC_PASSWORD
              value: "opentraum123!"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
        - name: kubectl-sidecar
          image: bitnami/kubectl:latest
          command: ["sh", "-c", "echo sidecar ready; sleep infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 64Mi
      restartPolicy: Always
