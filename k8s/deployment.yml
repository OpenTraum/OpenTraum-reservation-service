apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: opentraum
  labels:
    app: reservation-service
    app.kubernetes.io/name: reservation-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: reservation
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        app.kubernetes.io/name: reservation-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: reservation
    spec:
      terminationGracePeriodSeconds: 40
      priorityClassName: opentraum-high
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                        - payment-service
                        - event-service
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - reservation-service
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: opentraum
      initContainers:
        - name: wait-for-payment
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              echo Waiting for payment-service...;
              until wget -qO- http://payment-service:8085/actuator/health 2>/dev/null | grep -q UP;
              do echo payment not ready; sleep 3; done;
              echo payment-service is ready!
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 10m
              memory: 32Mi
      containers:
        - name: reservation-service
          image: 881490135253.dkr.ecr.ap-northeast-2.amazonaws.com/skala3-cloud1-team8-opentraum-reservation-service:b4b74ce6bbfa457a09ed42689289e608542dd2dc
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://reservation-db.kafka:3306/reservation"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: reservation-db-secret
                  key: mariadb-user
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reservation-db-secret
                  key: mariadb-password
            - name: TZ
              value: "Asia/Seoul"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
