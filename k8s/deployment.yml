apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: opentraum
  labels:
    app: reservation-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: reservation
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: reservation
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: reservation-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-reservation-service:00ce63816a4ef0550680a756dc91aeaa56605f0c
          ports:
            - containerPort: 8084
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://opentraum-postgres:5432/opentraum_reservation"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://opentraum-postgres:5432/opentraum_reservation"
            - name: SPRING_R2DBC_USERNAME
              value: "opentraum"
            - name: SPRING_R2DBC_PASSWORD
              value: "opentraum"
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always
